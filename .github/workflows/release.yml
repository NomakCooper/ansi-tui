---
name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.ref == 'refs/heads/stable-10' }}
    name: Publish stable-10 release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify

      - name: Check published tarball
        run: npm run pack:check

      - name: Read package version
        id: package
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      - name: Publish package to npm
        uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
          provenance: true

      - name: Create GitHub release from CHANGELOG.md
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.package.outputs.current-version }}
          name: v${{ steps.package.outputs.current-version }}
          bodyFile: CHANGELOG.md
          commit: ${{ github.sha }}
          allowUpdates: true
